<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recognition Tester</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        button.listening {
            background-color: #dc3545;
            animation: pulse 1.5s infinite;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lottery Voice Input</h2>
    <button id="start-btn">Start Listening</button>
    <input type="text" id="output-text" placeholder="Recognized text will appear here...">
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const outputText = document.getElementById('output-text');

    // Check for browser support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();

        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US'; // Change this to 'pt-BR' for Portuguese

        let isListening = false;

        startBtn.addEventListener('click', () => {
            if (!isListening) {
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        recognition.onstart = () => {
            isListening = true;
            startBtn.textContent = 'Stop Listening';
            startBtn.classList.add('listening');
        };

        recognition.onend = () => {
            isListening = false;
            startBtn.textContent = 'Start Listening';
            startBtn.classList.remove('listening');
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            // If we have a final result, put it in the input box
            if (finalTranscript) {
                outputText.value = finalTranscript;
            }
        };

        recognition.onerror = (event) => {
            console.error("Speech recognition error:", event.error);
            isListening = false;
            startBtn.textContent = 'Start Listening';
            startBtn.classList.remove('listening');
        };

    } else {
        alert("Your browser does not support the Web Speech API. Please try Chrome or Edge.");
    }
</script>

</body>
</html>
